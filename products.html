<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Katalog produk toko online">
    <title>Katalog Produk</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="brand">Toko Online Kami</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Katalog</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Level 1: Categories -->
        <section id="categories-section" class="catalog-section">
            <h2 class="section-title">Kategori Produk</h2>
            <div id="categories-grid" class="grid-container">
                <div class="loading">Memuat kategori...</div>
            </div>
        </section>

        <!-- Level 2: Products -->
        <section id="products-section" class="catalog-section hidden">
            <div class="section-header">
                <button id="back-button" class="btn btn-secondary">&larr; Kembali ke Kategori</button>
                <h2 id="category-title" class="section-title">Produk</h2>
            </div>
            <div id="products-grid" class="grid-container">
                <div class="loading">Memuat produk...</div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
